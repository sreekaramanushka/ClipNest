<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipNest - Video Preview</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #faf9f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }
    .preview-container {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    video {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      background: #000;
    }
    .title {
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      word-break: break-all;
      margin: 0;
    }
    .url {
      font-size: 0.85rem;
      opacity: 0.5;
      word-break: break-all;
      text-align: center;
      max-width: 80%;
    }
  </style>
  <script src="hls.min.js"></script>
</head>
<body>
  <div class="preview-container">
    <video id="player" controls autoplay></video>
    <h1 class="title" id="video-title">Loading preview...</h1>
    <div class="url" id="video-url"></div>
  </div>
  <script src="preview.js"></script>
</body>
</html>
